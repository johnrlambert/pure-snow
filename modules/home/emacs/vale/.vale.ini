MinAlertLevel = suggestion
StylesPath = styles

# Aggressive prose linting for notes and drafts.
# This is intentionally opinionated: write-good for plain style warnings,
# proselint for broader usage issues, alex for tone-sensitive phrasing,
# Readability for sentence/word complexity, and a few local John rules.
[*.{org,md,markdown,txt,rst,adoc}]
BasedOnStyles = write-good, proselint, alex, Readability, John
