[colors]
bg = @colors_bg@
bg-alt = @colors_bg_alt@
fg = @colors_fg@
fg-dim = @colors_fg_dim@
yellow = @colors_yellow@
orange = @colors_orange@
red = @colors_red@
green = @colors_green@
aqua = @colors_aqua@

[bar/example]
width = 100%
height = 28
offset-x = 0
offset-y = 0

background = @colors_bg@
foreground = @colors_fg@

padding-left = 2
padding-right = 2

module-margin = 2

tray-position = right
tray-padding = 2

font-0 = "Helvetica Neue LT Std:size=10;2"
font-1 = "Symbols Nerd Font Mono:size=10;2"
font-2 = "JetBrainsMono Nerd Font Mono:size=10;2"

modules-left = xworkspaces
modules-center = xwindow
modules-right = journal cpu memory date

[module/xworkspaces]
type = internal/xworkspaces
enable-click = true
enable-scroll = true

label-active = %name%
label-active-foreground = @colors_bg@
label-active-background = @colors_yellow@
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%!
label-urgent-background = @colors_red@
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = @colors_fg_dim@
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label =  %title:0:50:...%

[module/journal]
type = custom/text
content = ""
content-foreground = @colors_yellow@
click-left = sh -c 'emacsclient -c -e "(progn (org-journal-new-entry) nil)" || (emacs --daemon && emacsclient -c -e "(progn (org-journal-new-entry) nil)")'

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = @colors_green@
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = @colors_aqua@
label = %percentage_used%%

[module/date]
type = internal/date
interval = 5
date = "%Y-%m-%d %H:%M"
label = " %date%"
label-foreground = @colors_orange@
